name: Build Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT="${{ matrix.suffix }}"
          NAME="fetch-down-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build -trimpath -ldflags="-s -w" -o "dist/${NAME}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fetch-down-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="latest"
          TITLE="Latest Build ($(date -u +%Y-%m-%d))"
          BODY="Auto-built from \`${{ github.ref_name }}@${{ github.sha }}\`"

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "${{ github.repository }}" --clobber
            gh release edit "$TAG" --repo "${{ github.repository }}" --title "$TITLE" --notes "$BODY"
          else
            gh release create "$TAG" dist/* --repo "${{ github.repository }}" --title "$TITLE" --notes "$BODY" --latest
          fi
