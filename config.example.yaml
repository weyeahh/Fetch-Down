# Fetch-Down 配置文件
# ========================

# 运行模式: "bandwidth"（带宽模式）或 "traffic"（流量模式）
mode: "bandwidth"

# --- 带宽模式设置 ---
# 目标下行/上行比例（如 2.0 表示下行 = 上行 × 2）
ratio: 2.0

# --- 流量模式设置 ---
# 目标：入网总流量 = 出网总流量 × 倍数
cumulative_multiplier: 1.0
# 时间窗口（支持 Go duration 格式，如 "24h"、"1h"、"30m"）
window_duration: "24h"

# --- 下载设置 ---
# 下载 URL 列表（轮询选择），仅允许 http/https
download_urls:
  - "http://speedtest.tele2.net/10MB.zip"
  - "http://speedtest.tele2.net/100MB.zip"

# 最大并发下载数
max_concurrent: 4

# 总下载速率限制（Mbps），0 = 不限制
# 设置此项以避免占满网络接口带宽
bandwidth_limit_mbps: 100

# --- 流量采集 ---
# 上行监控的网卡名称
# 留空则自动检测
uplink_interface: "eth0"

# 采样间隔（秒）
uplink_sample_interval: 1

# --- 连接设置 ---
# 连接超时（秒），应用于 TCP 握手和响应头等待
connect_timeout_sec: 10

# 读取超时（秒），应用于单次下载尝试的最大时长
read_timeout_sec: 30

# 最大重试次数（指数退避 + 随机抖动）
max_retries: 3

# --- 日志 ---
# 日志级别: "debug"、"info"、"warn"、"error"
log_level: "info"

# 统计信息输出间隔（秒）
stats_interval_sec: 10

# --- 状态持久化 ---
# 状态文件路径
# 留空则禁用持久化（带宽模式默认禁用）
# 流量模式留空时自动使用 "fetch-down-state.json"
state_file: ""

# 自动保存间隔（秒），0 = 仅退出时保存
state_save_interval: 60
